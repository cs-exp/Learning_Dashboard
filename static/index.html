<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic Dashboard</title>
    <style>
        /* CSS Variables for Light Theme (Default) */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --heading-color: #111111;
            --link-color: #0066cc;
            --link-hover: #004499;
            --details-bg: #f9f9f9;
            --details-border: #dddddd;
            --summary-bg: #eeeeee;
            --btn-bg: #e0e0e0;
            --btn-text: #333;
        }

        /* CSS Variables for Dark Theme */
        body.dark-mode {
            --bg-color: #181a1b;
            --text-color: #d1d5db;
            --heading-color: #e5e7eb;
            --link-color: #60a5fa;
            --link-hover: #93c5fd;
            --details-bg: #242729;
            --details-border: #3f4448;
            --summary-bg: #2d3134;
            --btn-bg: #374151;
            --btn-text: #e5e7eb;
        }

        body { 
            font-family: system-ui, sans-serif; 
            max-width: 800px; 
            margin: 2rem auto; 
            line-height: 1.6; 
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
        }
        
        h1 { color: var(--heading-color); }
        
        details { 
            background: var(--details-bg); 
            border: 1px solid var(--details-border); 
            border-radius: 4px; 
            margin-bottom: 0.5rem; 
        }
        
        summary { 
            font-weight: bold; 
            cursor: pointer; 
            padding: 10px; 
            background: var(--summary-bg); 
            color: var(--heading-color);
        }
        
        .content { padding: 10px 10px 10px 20px; }
        ul { list-style-type: none; padding-left: 0; }
        li { margin-bottom: 5px; }
        
        a { color: var(--link-color); text-decoration: none; }
        a:hover { color: var(--link-hover); text-decoration: underline; }

        /* Theme Toggle Button Styles */
        #theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            padding: 8px 16px;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--details-border);
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        #theme-toggle:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <button id="theme-toggle">🌓 Toggle Theme</button>
    <h1>Topic Dashboard</h1>
    <div id="tree-container">Loading topics...</div>

    <script>
        // --- Theme Toggle Logic ---
        const themeToggle = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme');

        // Check local storage on load
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-mode');
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
        });
        // --------------------------

        async function loadTree() {
            const response = await fetch('/api/tree');
            const data = await response.json();
            const container = document.getElementById('tree-container');
            container.innerHTML = ''; 
            container.appendChild(buildDOMTree(data));
        }

        function buildDOMTree(node) {
            if (node.path === "") {
                const rootDiv = document.createElement('div');
                node.dirs.forEach(dir => rootDiv.appendChild(buildDOMTree(dir)));
                return rootDiv;
            }

            const details = document.createElement('details');
            const summary = document.createElement('summary');
            summary.textContent = node.name;
            details.appendChild(summary);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';

            node.dirs.forEach(dir => {
                contentDiv.appendChild(buildDOMTree(dir));
            });

            if (node.files.length > 0) {
                const ul = document.createElement('ul');
                node.files.forEach(file => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.textContent = file.name.replace('.md', '');
                    a.href = `/viewer?file=${encodeURIComponent(file.path)}`;
                    a.target = "_blank"; 
                    li.appendChild(a);
                    ul.appendChild(li);
                });
                contentDiv.appendChild(ul);
            }

            details.appendChild(contentDiv);
            return details;
        }

        loadTree();
    </script>
</body>
</html>
